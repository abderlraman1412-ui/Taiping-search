<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="Icon" href="/taiping/img/1.png">
</head>
<body>

    <div class="profile-container">
        <h1>مرحباً بك في ملفك الشخصي 👋</h1>
        <hr>
        <div class="user-info">
            <p><strong>الاسم:</strong> <span id="profile-name"></span></p>
            <p><strong>البريد الإلكتروني:</strong> <span id="profile-email"></span></p>
            <p><strong>رقم الهاتف:</strong> <span id="profile-phone"></span></p>
            <p><strong>الجنس:</strong> <span id="profile-gender"></span></p>
            <p><strong>تاريخ الميلاد:</strong> <span id="profile-born"></span></p>
        </div>
        
        <button id="logout-btn" style="background-color: #ff4d4d; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; margin-top: 20px;">
            تسجيل الخروج
        </button>
    </div>

    <script src="profile.js"></script>
</body>
</html>
