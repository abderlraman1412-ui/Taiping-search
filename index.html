<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/taiping/img/1.png">
</head>
<body>
    <div class="log-in">
        <img src="/taiping/img/1.png" class="img">
        <form action="" class="inputs">

            <h1>log in</h1>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="enter password">
            </div>

            <div class="form-group">
                <label for="check-password">Check password</label>
                <input type="password" id="check-password" placeholder="enter password again">
            </div>

            <div class="form-group">
                <label for="tel">Your phone</label>
                <input type="tel" id="tel" placeholder="enter your phone">
            </div>

            <div class="form-group">
                <label for="born">Birthdate</label>
                <input type="date" id="born">
            </div>

            <div class="type">
                <label>Gender:</label>
                <div class="radio-options">
                    <label for="male">Male</label>
                    <input type="radio" id="male" name="gender" value="male">
                    
                    <label for="female">Female</label>
                    <input type="radio" id="female" name="gender" value="female">
                    
                </div>
            </div>
            <button type="submit" class="button">log in</button>  
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
